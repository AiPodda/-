<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI පොඩ්ඩා - Master AI Course</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.4/otpauth.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden; background: #001f3f; }

        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(0.5); object-fit: cover; }

        .welcome-banner { width: 100%; background: rgba(0, 51, 102, 0.8); padding: 20px; text-align: center; border-bottom: 2px solid #add8e6; }
        .welcome-text { font-size: 2.5rem; font-weight: bold; background: linear-gradient(90deg, #ffffff, #add8e6, #ffffff); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: moveColor 3s linear infinite; }
        @keyframes moveColor { 0% { background-position: 0%; } 100% { background-position: 200%; } }

        /* Name Animation */
        .animated-name {
            font-size: 3rem;
            font-family: 'Verdana', sans-serif;
            text-transform: uppercase;
            background: linear-gradient(to right, #00bfff, #ffffff, #00bfff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            animation: slideUp 1s ease-out forwards, glow 2s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 5px #00bfff); } 50% { filter: drop-shadow(0 0 20px #00bfff); } }

        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; width: 92%; max-width: 420px; margin: 20px auto; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .form-group input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; background: white; color: black; font-weight: bold; }
        .btn-primary { width: 100%; padding: 12px; background: #0066cc; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; margin-top: 15px; }
        
        .dashboard { display: none; padding: 20px; text-align: center; }
        .video-item { padding: 15px; background: rgba(255,255,255,0.1); margin: 10px 0; border-radius: 8px; text-align: left; border-left: 4px solid #00bfff; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-flying-through-a-blue-galaxy-background-1612-large.mp4" type="video/mp4">
    </video>

    <div class="welcome-banner">
        <div class="welcome-text">AI පොඩ්ඩා PORTAL</div>
    </div>

    <div id="auth-container">
        <div class="glass-card" id="reg-box">
            <h2>STUDENT REGISTER</h2>
            <div class="form-group"><input type="text" id="r-name" placeholder="FULL NAME (ENGLISH)"></div>
            <div class="form-group"><input type="email" id="r-email" placeholder="EMAIL ADDRESS"></div>
            <div class="form-group"><input type="password" id="r-pass" placeholder="PASSWORD"></div>
            <button class="btn-primary" onclick="showStep2()">Next Step</button>
            <p style="margin-top:10px;">Already have an account? <a href="#" onclick="showLogin()" style="color:#00bfff;">Login</a></p>
        </div>

        <div class="glass-card" id="verify-box" style="display:none;">
            <h2 style="color:#00bfff;">OTP VERIFICATION</h2>
            <p style="font-size: 0.9rem; margin-top:10px;">ඇඩ්මින් ලබා දෙන Google Authenticator Code එක ඇතුළත් කරන්න.</p>
            <div class="form-group">
                <input type="text" id="otp-code" placeholder="000000" maxlength="6" style="text-align:center; font-size:1.5rem; letter-spacing:5px;">
            </div>
            <button class="btn-primary" onclick="validateAndRegister()">VERIFY & REGISTER</button>
        </div>

        <div class="glass-card" id="login-box" style="display:none;">
            <h2>STUDENT LOGIN</h2>
            <div class="form-group"><input type="email" id="l-email" placeholder="EMAIL"></div>
            <div class="form-group"><input type="password" id="l-pass" placeholder="PASSWORD"></div>
            <button class="btn-primary" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="glass-card" style="max-width:600px;">
            <p style="color:#add8e6;">Welcome Back,</p>
            <div id="name-display"></div>
            <hr style="margin:20px 0; opacity:0.2;">
            <div class="video-item"><i class="fas fa-video"></i> Lesson 01: Creating AI Avatars</div>
            <div class="video-item"><i class="fas fa-video"></i> Lesson 02: Monetizing AI Content</div>
            <button class="btn-primary" style="background:#cc0000;" onclick="handleLogout()">Logout Device</button>
        </div>
    </div>

    <script>
        let tempUser = {};
        // Admin Secret Key (මෙය ඇඩ්මින්ගේ Google App එකට දාන Key එකයි)
        const ADMIN_SECRET = "JBSWY3DPEHPK3PXP"; 

        function showStep2() {
            tempUser.name = document.getElementById('r-name').value;
            tempUser.email = document.getElementById('r-email').value;
            tempUser.pass = document.getElementById('r-pass').value;

            if(!tempUser.name || !tempUser.email) return alert("කරුණාකර විස්තර සම්පූර්ණ කරන්න.");
            
            // ඇඩ්මින්ට විස්තර යැවීම (WhatsApp)
            const msg = `*New Request*%0AName: ${tempUser.name}%0AEmail: ${tempUser.email}%0A*Secret Key:* ${ADMIN_SECRET}`;
            window.open(`https://wa.me/94762196055?text=${msg}`, '_blank');

            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'block';
        }

        function validateAndRegister() {
            const inputOTP = document.getElementById('otp-code').value;
            
            // Google Authenticator Verification
            const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(ADMIN_SECRET), digits: 6 });
            let isValid = totp.validate({ token: inputOTP, window: 1 });

            if(isValid !== null) { // මෙතනදී 123456 වැනි අංක වැඩ කරන්නේ නැත. App එකේ එකම විය යුතුය.
                alert("Verification Successful!");
                localStorage.setItem('user_' + tempUser.email, JSON.stringify(tempUser));
                showLogin();
            } else {
                alert("වැරදි කේතයක්! කරුණාකර ඇඩ්මින් ලබා දෙන නිවැරදි අංකයම ඇතුළත් කරන්න.");
            }
        }

        function showLogin() {
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        }

        function handleLogin() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const savedUser = JSON.parse(localStorage.getItem('user_' + email));

            if (savedUser && savedUser.pass === pass) {
                // --- Device Locking Logic ---
                const sessionKey = 'session_' + email;
                const currentDeviceId = localStorage.getItem('my_device_id') || Math.random().toString(36).slice(2);
                localStorage.setItem('my_device_id', currentDeviceId);

                const activeSession = localStorage.getItem(sessionKey);

                if (activeSession && activeSession !== currentDeviceId) {
                    alert("මෙම ගිණුම දැනටමත් වෙනත් ඩිවයිස් එකකින් හෝ බ්‍රවුසරයකින් භාවිතා කරයි. කරුණාකර එයින් ඉවත් වී නැවත උත්සාහ කරන්න.");
                } else {
                    // Session එක ලොක් කිරීම
                    localStorage.setItem(sessionKey, currentDeviceId);
                    
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    const nameDiv = document.getElementById('name-display');
                    nameDiv.innerHTML = `<h1 class="animated-name">${savedUser.name}</h1>`;
                }
            } else {
                alert("ඊමේල් ලිපිනය හෝ මුරපදය වැරදියි!");
            }
        }

        function handleLogout() {
            const email = JSON.parse(localStorage.getItem('user_' + document.getElementById('l-email').value))?.email;
            if(email) localStorage.removeItem('session_' + email);
            location.reload();
        }
    </script>
</body>
</html>
