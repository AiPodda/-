<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI පොඩ්ඩා - Future of AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            background: #000;
        }

        /* 1. Galaxy Background Video */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.6) blue;
            object-fit: cover;
        }

        /* 2. Scrolling Welcome Text */
        .header-container {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
        }

        .welcome-marquee {
            width: 100%;
            overflow: hidden;
            border: 2px solid #add8e6;
            background: rgba(0,0,0,0.5);
            padding: 10px 0;
        }

        .welcome-marquee h1 {
            display: inline-block;
            color: #00ff00;
            font-size: 2.5rem;
            white-space: nowrap;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 3. Animated Robot */
        .robot-box {
            margin: 20px auto;
            width: 100px;
            height: 100px;
            position: relative;
            animation: headMove 3s ease-in-out infinite;
        }

        .robot-head {
            width: 80px;
            height: 70px;
            background: #add8e6;
            border-radius: 15px;
            margin: 0 auto;
            position: relative;
            border: 3px solid #0066cc;
        }

        .eye {
            width: 15px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 20px;
            animation: blink 4s infinite;
        }

        .eye.left { left: 15px; }
        .eye.right { right: 15px; }

        @keyframes blink {
            0%, 90%, 100% { height: 15px; }
            95% { height: 2px; }
        }

        @keyframes headMove {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(5deg) translateY(-5px); }
        }

        /* 4. Animated Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            text-align: center;
        }

        .wa-btn {
            background: #ff0000;
            color: white;
            padding: 15px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid white;
            animation: colorChange 1s infinite alternate;
        }

        @keyframes colorChange {
            from { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
            to { background: #00ff00; box-shadow: 0 0 20px #00ff00; }
        }

        /* Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Social Media Footer */
        .social-footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            margin-top: 30px;
        }

        .social-icons a {
            color: white;
            font-size: 2rem;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-icons a:hover { transform: scale(1.2); }
        .fa-tiktok { color: #ff0050; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }
        .fa-whatsapp { color: #25d366; }

        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.2); color: white; }
        .btn-primary { width: 100%; padding: 15px; background: #0066cc; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-nebula-in-outer-space-background-1611-large.mp4" type="video/mp4">
    </video>

    <div class="whatsapp-float">
        <a href="https://wa.me/94762196055" class="wa-btn" target="_blank">
            <i class="fab fa-whatsapp" style="font-size: 2rem;"></i>
            <span>0762196055</span>
        </a>
    </div>

    <div class="header-container">
        <div class="welcome-marquee">
            <h1>WELCOME TO AI PODDA LEARNING CENTER</h1>
        </div>
        <div class="robot-box">
            <div class="robot-head">
                <div class="eye left"></div>
                <div class="eye right"></div>
            </div>
            <div style="width:40px; height:10px; background:#0066cc; margin:5px auto; border-radius:5px;"></div>
        </div>
    </div>

    <div id="authArea">
        <div class="glass-card" id="regForm">
            <h2 style="text-align: center; margin-bottom: 20px;">Student Registration</h2>
            <div class="form-group"><input type="text" id="name" placeholder="ඔබේ නම"></div>
            <div class="form-group"><input type="email" id="email" placeholder="ඊමේල් ලිපිනය"></div>
            <div class="form-group"><input type="tel" id="phone" placeholder="දුරකථන අංකය"></div>
            <div class="form-group"><input type="password" id="pass" placeholder="මුරපදයක් ඇතුළත් කරන්න"></div>
            <button class="btn-primary" onclick="toStep2()">Register Now</button>
        </div>
    </div>

    <footer class="social-footer">
        <h3 style="margin-bottom: 15px; color: #add8e6;">Connect With Us</h3>
        <div class="social-icons">
            <a href="https://www.tiktok.com/@ai_podda2?_r=1&_t=ZS-94bLsF3g1w5" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/share/1CCptRphbm/" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="#" target="_blank"><i class="fab fa-youtube"></i></a> <a href="https://whatsapp.com/channel/0029Vb7R7sP6WaKgGMs4oy1X" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">© 2026 AI Podda. All Rights Reserved.</p>
    </footer>

    <script>
        let studentData = {};

        function toStep2() {
            studentData.name = document.getElementById('name').value;
            studentData.email = document.getElementById('email').value;
            studentData.phone = document.getElementById('phone').value;
            studentData.pass = document.getElementById('pass').value;

            if(!studentData.name || !studentData.email) return alert("විස්තර සම්පූර්ණ කරන්න!");

            // WhatsApp පණිවිඩය සකස් කිරීම
            const waMsg = `*New Registration*%0AName: ${studentData.name}%0AEmail: ${studentData.email}%0APhone: ${studentData.phone}%0APassword: ${studentData.pass}`;
            
            // රිසිට් එක ඉල්ලන පණිවිඩයක් සමඟ WhatsApp වෙත යොමු කිරීම
            alert("ඔබේ විස්තර තහවුරු කිරීමට දැන් WhatsApp වෙත යොමු කෙරේ. කරුණාකර එහිදී ගෙවීම් රිසිට්පත එවන්න.");
            window.open(`https://wa.me/94762196055?text=${waMsg}`, '_blank');
            
            // මෙහිදී රෙජිස්ටර් වීමේ ඉතිරි පියවර (කෝඩ් එක ගැසීම) පෙන්විය හැක.
            showOtpStep();
        }

        function showOtpStep() {
            document.getElementById('regForm').innerHTML = `
                <h2 style="text-align: center;">Verify Admin Code</h2>
                <p style="text-align: center; margin: 15px 0; font-size: 0.9rem;">ඇඩ්මින් ඔබට ලබා දෙන අංක 6 මෙතන ඇතුළත් කරන්න.</p>
                <input type="text" id="otpCode" placeholder="Enter 6-digit code" style="width:100%; padding:15px; border-radius:10px; text-align:center; font-size:1.5rem; letter-spacing:5px;">
                <button class="btn-primary" style="margin-top:20px;" onclick="completeReg()">Complete Registration</button>
            `;
        }

        function completeReg() {
            alert("ගිණුම සාර්ථකව නිර්මාණය විය! දැන් ලොග් වන්න.");
            location.reload(); 
        }
    </script>
</body>
</html>
