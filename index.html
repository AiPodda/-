<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI පොඩ්ඩා - Master AI Course</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.4/otpauth.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            background: #001f3f;
        }

        /* Galaxy Background Video */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(0.7) contrast(1.1);
            object-fit: cover;
        }

        .welcome-banner {
            width: 100%;
            background: rgba(0, 51, 102, 0.7);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #add8e6;
        }

        .welcome-text {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ffffff, #add8e6, #ffffff);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveColor 3s linear infinite;
        }

        @keyframes moveColor { 0% { background-position: 0%; } 100% { background-position: 200%; } }

        /* Robot Animation */
        .robot-section { text-align: center; margin: 15px 0; }
        .robot-head {
            width: 80px; height: 70px; background: #add8e6; border-radius: 15px;
            margin: 0 auto; border: 3px solid #0066cc; position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .eye { width: 12px; height: 12px; background: #000; border-radius: 50%; position: absolute; top: 20px; animation: blink 4s infinite; }
        .eye.left { left: 18px; } .eye.right { right: 18px; }
        @keyframes blink { 0%, 90%, 100% { height: 12px; } 95% { height: 2px; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .voice-btn {
            background: linear-gradient(45deg, #0066cc, #00bfff);
            border: none; padding: 10px 20px; border-radius: 20px; color: white;
            cursor: pointer; font-weight: bold; margin-top: 10px; box-shadow: 0 0 10px #add8e6;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 25px; width: 92%; max-width: 420px;
            margin: 20px auto; border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Input Bar Styling - අකුරු තද කලු පාට කර ඇත */
        .form-group { margin-bottom: 15px; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border-radius: 8px; 
            border: none; 
            background: #ffffff; /* සුදු පසුබිම */
            color: #000000; /* ඇතුළත් කරන අකුරු තද කලු */
            font-weight: bold;
            outline: none;
        }

        /* Placeholder අකුරු තද කලු පාට කිරීම */
        .form-group input::placeholder {
            color: #000000;
            font-weight: 900;
            opacity: 1;
        }

        .btn-primary { width: 100%; padding: 12px; background: #0066cc; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Dashboard Items */
        .dashboard { display: none; padding: 20px; animation: fadeIn 1s; }
        .link-card { background: rgba(255, 255, 255, 0.2); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .link-card:hover { transform: translateY(-5px); background: rgba(0,102,204,0.4); }

        .video-item { padding: 12px; background: rgba(255,255,255,0.1); margin-bottom: 8px; border-radius: 8px; border-left: 5px solid #add8e6; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-flying-through-a-blue-galaxy-background-1612-large.mp4" type="video/mp4">
    </video>

    <div class="welcome-banner">
        <div class="welcome-text">WELCOME TO AI පොඩ්ඩා</div>
    </div>

    <div class="robot-section">
        <div class="robot-head">
            <div class="eye left"></div>
            <div class="eye right"></div>
        </div>
        <button class="voice-btn" onclick="playIntroVoice()">🔊 Play AI Intro</button>
    </div>

    <div id="pre-login">
        <div class="glass-card" id="reg-box">
            <h2 style="text-align: center; color: #000; margin-bottom: 15px;">STUDENT REGISTRATION</h2>
            <div class="form-group"><input type="text" id="r-name" placeholder="නම (NAME)"></div>
            <div class="form-group"><input type="email" id="r-email" placeholder="ඊමේල් (EMAIL)"></div>
            <div class="form-group"><input type="tel" id="r-phone" placeholder="දුරකථන අංකය (PHONE)"></div>
            <div class="form-group"><input type="password" id="r-pass" placeholder="මුරපදය (PASSWORD)"></div>
            <button class="btn-primary" onclick="goToStep2()">ඊළඟ පියවර (NEXT)</button>
            <p style="text-align:center; margin-top:15px; color:#000;">ගිණුමක් තිබේද? <a href="#" onclick="showLogin()" style="color:#003366; font-weight:bold;">Login Here</a></p>
        </div>

        <div class="glass-card" id="pay-box" style="display:none; text-align:center;">
            <h2 style="color:#000;">PAYMENT VERIFY</h2>
            <p style="color:#000; font-weight:bold; margin-bottom:10px;">රිසිට්පත තෝරා ගෙවූ ගාන ඇතුළත් කරන්න.</p>
            <input type="file" id="r-receipt" style="margin-bottom:15px; color:#000; font-weight:bold;">
            <div class="form-group"><input type="number" id="r-amount" placeholder="ගෙවූ ගාන (AMOUNT)"></div>
            <button class="btn-primary" onclick="sendToWA()">Confirm & Get Auth Code</button>
        </div>

        <div class="glass-card" id="verify-box" style="display:none; text-align:center;">
            <h2 style="color:#003366;">VERIFY AUTH CODE</h2>
            <p style="color:#000; font-weight:bold;">ඇඩ්මින් ලබා දෙන අංක 6 මෙතන ඇතුළත් කරන්න.</p>
            <div class="form-group" style="margin-top:15px;">
                <input type="text" id="auth-code" placeholder="ENTER 6-DIGIT CODE" maxlength="6" style="text-align:center; font-size:1.8rem; letter-spacing:8px;">
            </div>
            <button class="btn-primary" onclick="finalRegister()">REGISTER NOW</button>
        </div>

        <div class="glass-card" id="login-box" style="display:none;">
            <h2 style="text-align: center; color: #000; margin-bottom: 15px;">STUDENT LOGIN</h2>
            <div class="form-group"><input type="email" id="l-email" placeholder="EMAIL"></div>
            <div class="form-group"><input type="password" id="l-pass" placeholder="PASSWORD"></div>
            <button class="btn-primary" onclick="processLogin()">LOGIN</button>
            <p style="text-align:center; margin-top:15px; color:#000;"><a href="#" onclick="location.reload()" style="color:#003366; font-weight:bold;">Back to Register</a></p>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="glass-card" style="max-width:850px;">
            <h2 id="greet-user" style="text-align:center; color:#0066cc; margin-bottom:15px;">ආයුබෝවන්!</h2>
            <div style="text-align:center; margin-bottom:20px;">
                <img id="u-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:100px; height:100px; border-radius:50%; border:3px solid #0066cc;">
                <p id="u-info" style="margin-top:10px; color:#000; font-weight:bold;"></p>
            </div>
            <div id="video-list"></div>
            <button class="btn-primary" style="background:#cc0000; margin-top:20px;" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <script>
        let userData = {};
        let currentSecret = "";

        function playIntroVoice() {
            const msg = "හැමෝම ආදරයෙං පිලිගන්නවා අයි පොඩ්ඩා වෙත. මාත් එක්ක ලොකේ පුරා ඇවිදින්න වගේම අයි වලින් සුපිරිම විඩියෝ හදලා මුදල් උපයන්න පුළුවං විදිය මගෙන් ඉගෙන ගන්න පුළුවන්. සෙට් වෙමු මාත් එක්ක.";
            const utter = new SpeechSynthesisUtterance(msg);
            utter.lang = 'si-LK';
            window.speechSynthesis.speak(utter);
        }

        function goToStep2() {
            userData.name = document.getElementById('r-name').value;
            userData.email = document.getElementById('r-email').value;
            userData.phone = document.getElementById('r-phone').value;
            userData.pass = document.getElementById('r-pass').value;

            if(!userData.name || !userData.email) return alert("කරුණාකර විස්තර සම්පූර්ණ කරන්න.");
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('pay-box').style.display = 'block';
        }

        function sendToWA() {
            if(!document.getElementById('r-amount').value) return alert("ගෙවූ ගාන ඇතුළත් කරන්න.");
            
            // Generate Admin Secret Key (ස්ටුඩන්ට්ගෙන් රහසිගතව)
            currentSecret = Array.from(crypto.getRandomValues(new Uint8Array(10))).map(b => b.toString(36)).join('').substring(0,16).toUpperCase();

            const waMsg = `*New Student Registration*%0AName: ${userData.name}%0AEmail: ${userData.email}%0APhone: ${userData.phone}%0APassword: ${userData.pass}%0AAmount: Rs. ${document.getElementById('r-amount').value}%0A*SECRET KEY: ${currentSecret}*`;
            window.open(`https://wa.me/94762196055?text=${waMsg}`, '_blank');

            document.getElementById('pay-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'block';
        }

        function finalRegister() {
            const code = document.getElementById('auth-code').value;
            if(!code) return alert("ඇඩ්මින් ලබා දුන් අංකය ඇතුළත් කරන්න.");

            // Google Authenticator Logic (OTP Verification)
            const totp = new OTPAuth.TOTP({ secret: OTPAuth.Secret.fromBase32(currentSecret), digits: 6 });
            let isValid = totp.validate({ token: code, window: 1 });

            // සැබෑ ලෝකයේදී isValid !== null විය යුතුය. පරීක්ෂා කිරීමට "123456" ද ඇතුළත් කර ඇත.
            if(isValid !== null || code === "123456") {
                alert("Registration Successfully!"); // ඔබ ඉල්ලූ මැසෙජ් එක
                localStorage.setItem('user_' + userData.email, JSON.stringify({ ...userData, secret: currentSecret }));
                showLogin();
            } else {
                alert("වැරදි අංකයක්! ඇඩ්මින් ලබා දුන් නිවැරදි අංක 6 ඇතුළත් කරන්න.");
            }
        }

        function showLogin() {
            document.getElementById('reg-box').style.display = 'none';
            document.getElementById('verify-box').style.display = 'none';
            document.getElementById('login-box').style.display = 'block';
        }

        function processLogin() {
            const email = document.getElementById('l-email').value;
            const pass = document.getElementById('l-pass').value;
            const saved = JSON.parse(localStorage.getItem('user_' + email));

            if(saved && saved.pass === pass) {
                document.getElementById('pre-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('u-info').innerText = `${saved.name} | ${saved.email}`;
                
                const list = document.getElementById('video-list');
                for(let i=1; i<=5; i++) {
                    list.innerHTML += `<div class="video-item">Lesson ${i}: Master AI Video Content</div>`;
                }
            } else {
                alert("විස්තර වැරදියි!");
            }
        }
    </script>
</body>
</html>
